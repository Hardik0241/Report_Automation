name: Report Automation Scheduler

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every 20 minutes from 09:00 to 23:40 UTC (2:30 PM to 5:00 AM IST next day)
    - cron: '*/20 9-23 * * *'
    - cron: '0,20,40 0-4 * * *'
  workflow_dispatch:

jobs:
  run-processor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd Working_Report_Editor
          pip install -r requirements.txt

      - name: Create logs directory
        run: mkdir -p Working_Report_Editor/logs Working_Report_Editor/attachments

      - name: Run processor
        run: cd Working_Report_Editor && python main.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SALES_SPREADSHEET_ID: ${{ secrets.SALES_SPREADSHEET_ID }}
          HR_SPREADSHEET_ID: ${{ secrets.HR_SPREADSHEET_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
