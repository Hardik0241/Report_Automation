name: Report Automation Scheduler

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/20 9-18 * * *'
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  run-processor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Important: Fetch the repository with write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: Working_Report_Editor
        run: |
          pip install -r requirements.txt

      - name: Create logs directory
        run: |
          mkdir -p Working_Report_Editor/logs
          mkdir -p Working_Report_Editor/attachments

      - name: Run processor
        working-directory: Working_Report_Editor
        run: python main.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SALES_SPREADSHEET_ID: ${{ secrets.SALES_SPREADSHEET_ID }}
          HR_SPREADSHEET_ID: ${{ secrets.HR_SPREADSHEET_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

      - name: Commit and push logs to repository
        run: |
          cd Working_Report_Editor
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/processing_logs.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update processing logs [skip ci]"
            git push
            echo "Logs committed to repository"
          fi
