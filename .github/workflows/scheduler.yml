name: Report Automation Scheduler

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every 20 minutes from 09:00 to 18:20 UTC (2:30 PM to 11:59 PM IST)
    # UTC is 5 hours 30 minutes behind IST
    # IST 2:30 PM = UTC 09:00
    # IST 11:59 PM = UTC 18:29
    - cron: '*/20 9-18 * * *'
    # Final run at 18:20 UTC (11:50 PM IST) - last run before cutoff
    - cron: '20 18 * * *'
  workflow_dispatch:

jobs:
  run-processor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: Working_Report_Editor
        run: |
          pip install -r requirements.txt

      - name: Create logs directory
        run: |
          mkdir -p Working_Report_Editor/logs
          mkdir -p Working_Report_Editor/attachments

      - name: Run processor
        working-directory: Working_Report_Editor
        run: python main.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SALES_SPREADSHEET_ID: ${{ secrets.SALES_SPREADSHEET_ID }}
          HR_SPREADSHEET_ID: ${{ secrets.HR_SPREADSHEET_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
